name: Compile and Commit AdGuard Hostlist

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  compile-hostlist:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Install the AdGuard hostlist compiler globally
      - name: Install @adguard/hostlist-compiler
        run: npm install -g @adguard/hostlist-compiler

      # Step 3: Compile the host list
      - name: Compile host list from basic.json
        run: hostlist-compiler -c basic.json -o basic.txt

      # Step 4: Configure Git for commit
      - name: Configure Git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      # Step 5: Commit the generated basic.txt to the main branch
      - name: Commit and push changes
        run: |
          git add basic.txt
          git commit -m "Update basic.txt"
