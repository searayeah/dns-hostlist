name: Blocklist compile

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y npm
      - run: npm i -g @adguard/hostlist-compiler
      - run: hostlist-compiler -c conf.json -o output.txt
      - uses: stefanzweifel/git-auto-commit-action@v5
